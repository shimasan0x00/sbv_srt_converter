<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/webp" href="./image/circle.webp" />
    <title>SBV → SRT Converter</title>
  </head>
  <body>
    <main class="container">
      <header>
        <div class="title-row">
          <img
            class="avatar"
            src="./image/circle.webp"
            alt=""
            width="40"
            height="40"
          />
          <h1>SBV → SRT Converter</h1>
          <a
            class="repo-link"
            href="https://github.com/shimasan0x00"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="作者の GitHub プロフィールを開く"
          >
            GitHub
          </a>
        </div>
        <p class="lead">
          ブラウザ内で完結する字幕変換ツール。ファイルは外部に送信されません。
        </p>
      </header>

      <section class="controls">
        <label class="file-label" for="file-input">
          <span>SBV ファイルを選ぶ</span>
          <input id="file-input" type="file" accept=".sbv,text/plain" />
        </label>
        <div id="drop-zone" class="drop-zone" aria-label="ここに .sbv をドロップ">
          またはここに .sbv をドロップ
        </div>
      </section>

      <section class="actions">
        <button id="download-btn" type="button" disabled>
          .srt をダウンロード
        </button>
        <span id="file-name" class="file-name"></span>
      </section>

      <section class="output">
        <h2>プレビュー</h2>
        <pre id="preview" aria-live="polite"></pre>
      </section>

      <section id="error" class="error" role="alert" hidden></section>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
